name: Generate Pacman Animation
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generar animacion
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=yellow&color_dots=#4D78CC,#4D78CC,#4D78CC,#4D78CC,#4D78CC
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=yellow&color_dots=#0d1117,#0d1117,#0d1117,#0d1117,#161b22

      - name: Subir a la rama pacman-output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
