name: Generate Pacman Animation
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3

      - name: Generar Pac-Man
        uses: joaophi/PacMan@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          size: 6
          ghosts: 4

      - name: Subir a la rama pacman-output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
